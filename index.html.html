<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Carfixo · Beta</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{--ink:#0B1B2B;--blue:#1E6BFF;--blue2:#0A47C2;--green:#16B364;--gold:#FFB020;
    --purple:#7C5CFF;--red:#E5484D;--muted:#6B7B8E;--line:#E4EAF2;--mist:#F2F5FA;--soft:#EAF1FF}
  *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,system-ui,sans-serif;background:var(--mist);color:var(--ink);
    -webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
  .wrap{max-width:560px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:9px;padding:14px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);z-index:10}
  .logo{font-size:19px;font-weight:800;letter-spacing:-.4px}.logo b{color:var(--blue)}
  .betaTag{font-size:9px;font-weight:800;background:var(--gold);color:#5a3d00;padding:3px 8px;border-radius:99px}
  .hRight{margin-left:auto;display:flex;gap:8px;align-items:center}
  main{flex:1;padding:18px;padding-bottom:26px}
  h2{font-size:20px;font-weight:800;letter-spacing:-.4px}
  h3{font-size:15px;font-weight:800;margin-top:4px}
  p.sub{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5}
  .label{font-size:10.5px;font-weight:800;color:#39495b;letter-spacing:.4px;text-transform:uppercase;margin:16px 0 7px}
  input,textarea,select{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px;font-size:15px;font-family:inherit;color:var(--ink);background:#fff;-webkit-appearance:none}
  select:disabled{background:var(--mist);color:#9CA9B8}
  textarea{min-height:84px;resize:vertical}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue)}
  /* dynamische Buttons: Glow-Puls + Shimmer (wie in der App) */
  .btn{position:relative;overflow:hidden;width:100%;height:52px;border:none;border-radius:14px;background:var(--blue);color:#fff;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:14px;transition:transform .12s}
  .btn:active{transform:scale(.97)}
  @keyframes glowP{0%,100%{box-shadow:0 8px 22px rgba(30,107,255,.32)}50%{box-shadow:0 12px 32px rgba(30,107,255,.5)}}
  @keyframes shimS{0%{transform:translateX(-160%) skewX(-18deg)}55%,100%{transform:translateX(320%) skewX(-18deg)}}
  .btn:not(.ghost):not(:disabled){animation:glowP 2.8s ease-in-out infinite}
  .btn:not(.ghost)::after{content:"";position:absolute;top:0;left:0;width:36%;height:100%;background:linear-gradient(110deg,transparent,rgba(255,255,255,.3),transparent);animation:shimS 3.6s ease-in-out infinite;pointer-events:none}
  .btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  .btn.green{background:var(--green)}
  .btn.sm{width:auto;height:40px;margin:0;padding:0 15px;font-size:13px}
  .btn:disabled{opacity:.55;animation:none}
  @media(prefers-reduced-motion:reduce){.btn{animation:none!important}.btn::after{animation:none!important}}
  .card{border:1px solid var(--line);border-radius:15px;padding:14px;margin-bottom:11px;background:#fff}
  .card.tap{cursor:pointer}.card.tap:active{background:#FAFCFF}
  .rowTop{display:flex;align-items:center;gap:11px}
  .ico{width:42px;height:42px;border-radius:12px;background:var(--mist);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
  .tt{font-size:14px;font-weight:700}
  .mm{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.45}
  .badge{font-size:9.5px;font-weight:800;padding:4px 9px;border-radius:99px;white-space:nowrap}
  .b-open{background:#E7F8EF;color:#0E8F4F}.b-blue{background:var(--soft);color:var(--blue2)}
  .b-grey{background:var(--mist);color:var(--muted)}.b-gold{background:#FFF6E6;color:#B25A00}
  .b-red{background:#FDECEC;color:#B3261E}.b-purple{background:#F1EDFF;color:#5B38D6}
  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:11px;padding-top:11px;border-top:1px solid var(--mist);font-size:12px;gap:8px;flex-wrap:wrap}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{padding:9px 12px;border:1.5px solid var(--line);border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;background:#fff;color:var(--ink)}
  .chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
  .catGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .catCard{border:1.5px solid var(--line);border-radius:13px;padding:11px;cursor:pointer;display:flex;align-items:center;gap:9px;background:#fff}
  .catCard.on{border-color:var(--blue);background:#F6F9FF}
  .catCard .ce{font-size:20px}
  .catCard .cn{font-size:11.5px;font-weight:700;line-height:1.25}
  .tabs{display:flex;border-top:1px solid var(--line);position:sticky;bottom:0;background:#fff;z-index:10}
  .tab{flex:1;text-align:center;padding:10px 2px calc(10px + env(safe-area-inset-bottom));font-size:9.5px;font-weight:700;color:#B4C0CE;cursor:pointer}
  .tab.on{color:var(--blue)}
  .tab .ti{font-size:19px;display:block;margin-bottom:2px}
  .seg{display:flex;background:var(--mist);border-radius:13px;padding:4px;margin:12px 0}
  .seg div{flex:1;text-align:center;padding:9px 4px;border-radius:10px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer}
  .seg div.on{background:#fff;color:var(--ink);box-shadow:0 2px 8px rgba(11,27,43,.08)}
  .note{background:var(--soft);border-radius:12px;padding:12px;font-size:12px;color:#3a5a9e;line-height:1.5;margin-bottom:14px}
  .warn{background:#FFF6E6;border:1px solid #FFE6B0;border-radius:12px;padding:12px;font-size:12px;color:#946200;line-height:1.5;margin-bottom:14px}
  .err{background:#FDECEC;border-radius:12px;padding:12px;font-size:12.5px;color:#B3261E;margin-top:12px;display:none}
  .empty{text-align:center;padding:36px 20px;color:var(--muted)}
  .empty .e{font-size:36px}
  .back{width:36px;height:36px;border-radius:11px;background:var(--mist);border:none;font-size:17px;color:#39495b;cursor:pointer}
  .offerLine{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:#39495b}
  .liRow{display:flex;gap:7px;margin-bottom:7px}
  .liRow input:last-child{width:86px;text-align:right}
  .msgs{display:flex;flex-direction:column;gap:7px;margin:12px 0;max-height:300px;overflow-y:auto}
  .msg{max-width:80%;padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.4;word-break:break-word}
  .msg.me{align-self:flex-end;background:var(--blue);color:#fff;border-bottom-right-radius:4px}
  .msg.them{align-self:flex-start;background:var(--mist);border-bottom-left-radius:4px}
  .msgRow{display:flex;gap:8px}
  .msgRow input{flex:1}
  .msgRow button{width:52px;height:48px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-size:16px;cursor:pointer}
  .kpis{display:flex;gap:9px;margin:12px 0 4px}
  .kpi{flex:1;background:var(--mist);border-radius:13px;padding:12px}
  .kpi .v{font-size:18px;font-weight:800}.kpi .l{font-size:10px;color:var(--muted);margin-top:2px}
  .carBox{background:var(--mist);border-radius:12px;padding:11px 13px;font-size:12.5px;font-weight:600;color:#39495b;line-height:1.5}
  .split{display:flex;gap:8px}.split>*{flex:1}
  .exChips .chip{font-size:11px;padding:8px 11px}
  .inline{display:flex;align-items:center;gap:9px;font-size:13px;margin-top:10px}
  .inline input[type=checkbox]{width:20px;height:20px;accent-color:var(--blue)}
  code{background:var(--mist);padding:2px 6px;border-radius:6px;font-size:12px}
  .hidden{display:none!important}
  .rowBtns{display:flex;gap:8px;margin-top:10px}
  .rowBtns .btn{margin-top:0}
</style>
</head>

function carLabel(v){
  const parts=[v.make+" "+v.model];
  if(v.series&&v.series!=="Keine Angabe")parts[0]+=" "+v.series;
  if(v.body_type)parts.push(v.body_type);
  if(v.engine)parts.push(v.engine);
  if(v.fuel)parts.push(v.fuel);
  if(v.transmission)parts.push(v.transmission);
  if(v.power_ps)parts.push(v.power_ps+" PS");
  if(v.year)parts.push("Baujahr "+v.year);
  return parts.join(" · ");
}

// ---------------- Setup / Verbindung ----------------
function getCfg(){try{return JSON.parse(localStorage.getItem("cfx_cfg")||"null");}catch(e){return null;}}
function initClient(){const c=getCfg();if(!c||!window.supabase)return false;db=window.supabase.createClient(c.url,c.key);return true;}

function renderSetup(){
  hideTabs();setBack(null);
  const c=getCfg()||{url:"",key:""};
  main.innerHTML=`
    <h2>Beta verbinden</h2>
    <p class="sub">Supabase-Projekt eintragen (Dashboard → Settings → API). Es wird nur der <b>öffentliche anon key</b> genutzt – niemals Service-Role oder Secrets.</p>
    <div class="label">Project URL</div>
    <input id="sUrl" placeholder="https://xxxx.supabase.co" value="${esc(c.url)}" autocapitalize="off" autocorrect="off">
    <div class="label">Anon / Publishable Key</div>
    <input id="sKey" placeholder="eyJ… oder sb_publishable_…" value="${esc(c.key)}" autocapitalize="off" autocorrect="off">
    <button class="btn" onclick="saveSetup()">Verbinden</button>
    <div class="err" id="setupErr"></div>`;
}
async function saveSetup(){
  const url=$("sUrl").value.trim().replace(/\/$/,""),key=$("sKey").value.trim(),err=$("setupErr");
  err.style.display="none";
  if(!/^https:\/\/.+\.supabase\.co$/.test(url))return showErr(err,"Die URL sieht nicht wie eine Supabase-Projekt-URL aus.");
  if(!key)return showErr(err,"Bitte den anon key eintragen.");
  try{const p=JSON.parse(atob(key.split(".")[1]||""));
    if(p&&p.role==="service_role")return showErr(err,"Das ist ein service_role-Key – der darf NIE ins Frontend. Bitte den anon key verwenden.");
  }catch(e){}
  localStorage.setItem("cfx_cfg",JSON.stringify({url,key}));
  if(!initClient())return showErr(err,"Supabase-Bibliothek nicht geladen (Internet?).");
  const ok=await db.from("workshops").select("id",{count:"exact",head:true});
  if(ok.error)return showErr(err,"Verbunden, aber Fehler: "+ok.error.message+" – wurden Setup + Migration V2 ausgeführt?");
  route();
}

// ---------------- Auth ----------------
function renderLogin(){
  hideTabs();setBack(null);
  main.innerHTML=`
    <h2>Anmelden</h2>
    <p class="sub">Mit Testaccount (E-Mail + Passwort) oder per E-Mail-Code.</p>
    <div class="label">E-Mail</div>
    <input id="lEmail" type="email" placeholder="kunde@carfixo-test.de" autocapitalize="off">
    <div class="label">Passwort</div>
    <input id="lPass" type="password" placeholder="••••••••">
    <button class="btn" onclick="loginPassword()">Anmelden</button>
    <button class="btn ghost" onclick="sendOtp()">Stattdessen Code per E-Mail</button>
    <div id="otpBox" class="hidden">
      <div class="label">6-stelliger Code</div>
      <input id="lCode" inputmode="numeric" maxlength="6" placeholder="123456">
      <button class="btn" onclick="verifyOtp()">Code bestätigen</button>
    </div>
    <div class="err" id="loginErr"></div>
    <p class="sub" style="margin-top:14px"><a href="#" onclick="renderSetup();return false">Supabase-Verbindung ändern</a></p>`;
}
async function loginPassword(){
  const err=$("loginErr");err.style.display="none";
  const {error}=await db.auth.signInWithPassword({email:$("lEmail").value.trim(),password:$("lPass").value});
  if(error)return showErr(err,error.message);route();
}
async function sendOtp(){
  const err=$("loginErr");err.style.display="none";
  const email=$("lEmail").value.trim();
  if(!email)return showErr(err,"Bitte zuerst die E-Mail eintragen.");
  const {error}=await db.auth.signInWithOtp({email,options:{shouldCreateUser:true}});
  if(error)return showErr(err,error.message);
  $("otpBox").classList.remove("hidden");
}
async function verifyOtp(){
  const err=$("loginErr");err.style.display="none";
  const {error}=await db.auth.verifyOtp({email:$("lEmail").value.trim(),token:$("lCode").value.trim(),type:"email"});
  if(error)return showErr(err,error.message);route();
}
async function signOut(){cleanRT();await db.auth.signOut();me=null;myProfile=null;myWorkshop=null;route();}
function cleanRT(){if(rtChannel){db.removeChannel(rtChannel);rtChannel=null;}}

// ---------------- Routing ----------------
async function route(){
  if(!window.supabase){main.innerHTML='<div class="warn">Supabase-Bibliothek konnte nicht geladen werden – Internetverbindung prüfen und neu laden.</div>';return;}
  if(!getCfg()){renderSetup();return;}
  if(!db)initClient();
  const {data:{user}}=await db.auth.getUser();
  me=user;
  $("btnOut").style.display=me?"block":"none";
  if(!me){renderLogin();return;}
  const {data:p}=await db.from("profiles").select("*").eq("id",me.id).single();
  myProfile=p;
  if(p&&(p.role==="workshop_owner"||p.role==="workshop_staff")){
    const {data:w}=await db.from("workshops").select("*").eq("owner_id",me.id).maybeSingle();
    myWorkshop=w;renderWs("open");
  }else{renderMyTenders();}
}
function setBack(fn){backTarget=fn;$("btnBack").classList.toggle("hidden",!fn);}
function goBack(){if(backTarget)backTarget();}
function hideTabs(){$("tabs").classList.add("hidden");}
function showTabs(a){

function opt(ph,list,sel){
  return `<option value="">${ph}</option>`+list.map(x=>`<option value="${esc(x)}" ${String(x)===String(sel??"")?"selected":""}>${esc(x)}</option>`).join("");
}
function seriesFor(make,model){return (SERIES[make+"|"+model]||[]).concat(["Keine Angabe"]);}
function kmLabel(m){if(!m)return"";const f=KM.find(k=>Number(k[0])===Number(m));return f?f[1]:"";}
function onMake(){
  const mk=$("cMake").value;
  const mo=$("cModel");mo.disabled=!mk;
  mo.innerHTML=mk?opt("Modell wählen…",BRANDS[mk]||[]):'<option value="">Erst Marke wählen</option>';
  $("cSeries").disabled=true;$("cSeries").innerHTML='<option value="">Erst Modell wählen</option>';
  $("cEngine").innerHTML=opt("Motorisierung wählen…",ENGINES[mk]||ENGINE_DEFAULT);
}
function onModel(){
  const mk=$("cMake").value,mo=$("cModel").value;
  const se=$("cSeries");se.disabled=!mo;
  se.innerHTML=mo?opt("Baureihe wählen…",seriesFor(mk,mo)):'<option value="">Erst Modell wählen</option>';
}
async function saveCar(editId){
  const err=$("cErr");err.style.display="none";
  const req=["cMake","cModel","cSeries","cBody","cYear","cEngine","cFuel","cPs","cTrans","cKm"];
  for(const id of req){if(!$(id).value)return showErr(err,"Bitte alle 10 Schritte ausfüllen.");}
  const kmVal=KM.find(k=>k[1]===$("cKm").value);
  const row={owner_id:me.id,make:$("cMake").value,model:$("cModel").value,series:$("cSeries").value,
    body_type:$("cBody").value,year:Number($("cYear").value),engine:$("cEngine").value,fuel:$("cFuel").value,
    power_ps:Number($("cPs").value),transmission:$("cTrans").value,mileage:kmVal?Number(kmVal[0]):null};
  $("cSave").disabled=true;
  const q=editId?db.from("vehicles").update(row).eq("id",editId):db.from("vehicles").insert(row);
  const {error}=await q;
  $("cSave").disabled=false;
  if(error)return showErr(err,error.message);
  renderCars();
}

function pickCat(k){selCat=k;EX={};document.querySelectorAll("#tCats .catCard").forEach(c=>c.classList.toggle("on",c.dataset.k===k));renderExtras();}
function renderExtras(){
  const defs=EXTRA_DEFS[selCat]||[];

    if(d.t==="select")return`<div class="label">${d.l}</div><select onchange="EX['${d.k}']=this.value">${opt("Bitte wählen…",d.o.filter(x=>x!==""),EX[d.k])}</select>`;
    if(d.t==="input")return`<div class="label">${d.l}</div><input placeholder="${d.p||""}" oninput="EX['${d.k}']=this.value">`;
    return`<div class="label">${d.l}</div><div class="chips exChips">${d.o.map(o=>`<span class="chip" onclick="exToggle('${d.k}','${esc(o)}',this)">${esc(o)}</span>`).join("")}</div>`;
  }).join("");
}
function exToggle(k,val,el){
  const arr=EX[k]||[];const i=arr.indexOf(val);
  if(i>=0)arr.splice(i,1);else arr.push(val);
  EX[k]=arr;el.classList.toggle("on");
}
async function createTender(){
  const err=$("tErr");err.style.display="none";
  const title=$("tTitle").value.trim(),desc=$("tDesc").value.trim();
  const carId=$("tCar").value;
  if(!carId)return showErr(err,"Bitte ein Fahrzeug wählen.");

  const car=myCars.find(c=>c.id===carId);
  $("tGo").disabled=true;
  const budget=parseFloat(($("tBudget").value||"").replace(",","."))||null;
  const {error}=await db.from("requests").insert({
    customer_id:me.id,vehicle_id:carId,vehicle_label:car?carLabel(car):null,
    category:selCat,title,description:desc,budget_max:budget,extras:EX,
    city:$("tCity").value||null,district:$("tDistrict").value||null,zip:$("tZip").value.trim()||null,

  renderMyTenders();
}

async function openTender(id){
  cleanRT();setBack(renderMyTenders);hideTabs();
  main.innerHTML='<div class="empty">Lade…</div>';
  const {data:r}=await db.from("requests").select("*").eq("id",id).single();

  const c=CATS[r.category]||["🔧",r.category];
  const booked=r.status==="booked";
  main.innerHTML=`
    <h2>${esc(r.title||c[1])}</h2>
    <div class="carBox" style="margin-top:10px">🚗 ${esc(r.vehicle_label||"Fahrzeug")}</div>
    <p class="sub">${esc(r.description||"")}</p>
    <div class="chips" style="margin-top:10px">
      <span class="chip on" style="cursor:default">${c[0]} ${c[1]}</span>
      ${extrasChips(r.extras)}
    </div>
    <p class="mm" style="margin-top:9px">
      ${r.district?"📍 "+esc(r.city||"Köln")+"-"+esc(r.district)+(r.zip?" ("+esc(r.zip)+")":"")+" · ":""}
      ${r.asap?"⚡ so schnell wie möglich · ":""}${r.preferred_date?"📅 Wunschtermin "+fmtDate(r.preferred_date)+" · ":""}${r.date_flexible?"🔄 flexibel · ":""}
      ${r.budget_max?"💶 Budget bis "+Math.round(r.budget_max)+" €":""}
    </p>
    <div id="bookedBox"></div>
    <div class="label">Angebote ${booked?"":'<span style="color:var(--green)">● live</span>'}</div>
    <div id="offers"><div class="empty">Lade…</div></div>
    <div class="label">Chat</div>
    <div class="msgs" id="msgs"></div>
    <div class="msgRow"><input id="msgIn" placeholder="Nachricht…"><button onclick="sendMsg('${r.id}')">➤</button></div>`;
  await loadOffers(r);
  await loadMsgs(r.id);
  if(booked)await loadBookedBox(r);
  rtChannel=db.channel("t:"+r.id)
    .on("postgres_changes",{event:"*",schema:"public",table:"offers",filter:"request_id=eq."+r.id},()=>loadOffers(r))
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages",filter:"request_id=eq."+r.id},()=>loadMsgs(r.id))
    .subscribe();
}
function extrasChips(ex){
  if(!ex)return"";

}

async function loadOffers(r){

async function acceptOffer(offerId,requestId){

  body.innerHTML=`
    <div class="chips" id="wsFil" style="margin-bottom:12px">
      <span class="chip ${wsFilter==='all'?'on':''}" onclick="setWsFilter('all')">Alle</span>
      ${myCats.map(k=>`<span class="chip ${wsFilter===k?'on':''}" onclick="setWsFilter('${k}')">${CATS[k]?CATS[k][0]+" "+CATS[k][1]:k}</span>`).join("")}
    </div>
    <div id="leads"><div class="empty">Lade…</div></div>`;
  await loadLeads();
  rtChannel=db.channel("leads")
    .on("postgres_changes",{event:"*",schema:"public",table:"requests"},()=>{if(wsTab==="open")loadLeads();})
    .subscribe();
}
function setWsFilter(f){wsFilter=f;document.querySelectorAll("#wsFil .chip").forEach(c=>c.classList.remove("on"));event.target.classList.add("on");loadLeads();}
async function loadLeads(){
  let q=db.from("requests").select("*").eq("status","open").order("created_at",{ascending:false});
  if(wsFilter!=="all")q=q.eq("category",wsFilter);
  const {data,error}=await q;
  const box=$("leads");if(!box)return;
  if(error){box.innerHTML=`<div class="warn">${esc(error.message)}</div>`;return;}
  if(!data||data.length===0){box.innerHTML='<div class="empty"><div class="e">📭</div><p class="sub">Keine offenen Ausschreibungen'+(wsFilter!=="all"?" in dieser Kategorie":"")+'. Neue erscheinen automatisch.</p></div>';return;}
  box.innerHTML=data.map(r=>{
    const c=CATS[r.category]||["🔧",r.category];
    return`<div class="card tap" onclick="openLead('${r.id}')">
      <div class="rowTop"><div class="ico">${c[0]}</div>
        <div style="flex:1"><div class="tt">${esc(r.title||c[1])}</div>
        <div class="mm">🚗 ${esc(r.vehicle_label||"Fahrzeug k.A.")}</div>
        <div class="mm">${c[1]}${r.district?" · 📍 "+esc(r.district):""}${r.zip?" ("+esc(r.zip)+")":""}${r.asap?" · ⚡ ASAP":""}${r.preferred_date?" · 📅 "+fmtDate(r.preferred_date):""}${r.date_flexible?" · 🔄 flexibel":""}${r.budget_max?" · 💶 bis "+Math.round(r.budget_max)+" €":""}</div></div>
        <span class="badge b-blue">Angebot →</span></div></div>`;
  }).join("");
}
async function openLead(id){
  cleanRT();setBack(()=>renderWs("open"));
  const {data:r}=await db.from("requests").select("*").eq("id",id).single();
  if(!r){renderWs("open");return;}
  const c=CATS[r.category]||["🔧",r.category];
  main.innerHTML=`
    <h2>Angebot abgeben</h2>
    <div class="card" style="margin-top:12px;background:var(--mist);border:none">
      <div class="tt">${esc(r.title||"Anfrage")}</div>
      <div class="mm" style="margin-top:6px">🚗 ${esc(r.vehicle_label||"k.A.")}</div>
      <p class="mm" style="margin-top:6px">${esc(r.description||"")}</p>
      <div class="chips" style="margin-top:9px"><span class="chip" style="cursor:default">${c[0]} ${c[1]}</span>${extrasChips(r.extras)}</div>
      <div class="mm" style="margin-top:8px">
        ${r.district?"📍 "+esc(r.city||"Köln")+"-"+esc(r.district)+(r.zip?" ("+esc(r.zip)+")":"")+" · ":""}
        ${r.asap?"⚡ ASAP · ":""}${r.preferred_date?"📅 "+fmtDate(r.preferred_date)+" · ":""}${r.date_flexible?"🔄 flexibel · ":""}
        ${r.budget_max?"💶 Budget bis "+Math.round(r.budget_max)+" €":""}
      </div>
    </div>
    <div class="label">Positionen</div>
    <div id="liBox">
      <div class="liRow"><input placeholder="z.B. Diagnose" class="liL"><input placeholder="€" inputmode="decimal" class="liP"></div>
      <div class="liRow"><input placeholder="z.B. Arbeitszeit" class="liL"><input placeholder="€" inputmode="decimal" class="liP"></div>
    </div>
    <button class="btn ghost" style="height:44px" onclick="addLine()">＋ Position</button>
    <div class="label">Nachricht (optional)</div>
    <textarea id="oMsg" placeholder="z.B. Termin diese Woche möglich…" style="min-height:60px"></textarea>
    <button class="btn" id="oGo" onclick="sendOffer('${r.id}')">Angebot senden</button>
    <div class="err" id="oErr"></div>
    <div class="label">Rückfragen an den Kunden</div>
    <div class="msgs" id="msgs"></div>
    <div class="msgRow"><input id="msgIn" placeholder="Nachricht…"><button onclick="sendMsg('${r.id}')">➤</button></div>`;
  loadMsgs(r.id);
  rtChannel=db.channel("lead:"+r.id)
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages",filter:"request_id=eq."+r.id},()=>loadMsgs(r.id))
    .subscribe();
}
function addLine(){const d=document.createElement("div");d.className="liRow";d.innerHTML='<input placeholder="Position" class="liL"><input placeholder="€" inputmode="decimal" class="liP">';$("liBox").appendChild(d);}
async function sendOffer(requestId){
  const err=$("oErr");err.style.display="none";
  const labels=[...document.querySelectorAll(".liL")].map(i=>i.value.trim());
  const prices=[...document.querySelectorAll(".liP")].map(i=>parseFloat((i.value||"").replace(",",".")));
  const items=[];labels.forEach((l,i)=>{if(l&&prices[i]>0)items.push({label:l,price:prices[i]});});
  if(items.length===0)return showErr(err,"Mindestens eine Position mit Preis angeben.");
  const total=items.reduce((s,x)=>s+x.price,0);
  $("oGo").disabled=true;
  const {error}=await db.from("offers").insert({request_id:requestId,workshop_id:myWorkshop.id,
    line_items:items,total_price:total,vat_rate:19,message:$("oMsg").value.trim()||null,status:"sent"});
  $("oGo").disabled=false;
  if(error)return showErr(err,error.message.includes("duplicate")?"Du hast hier schon ein Angebot abgegeben.":error.message);
  alert("Angebot gesendet ✅");
  renderWs("open");
}

async function wsJobs(){
  const body=$("wsBody");
  const {data,error}=await db.from("bookings")
    .select("*, offers(total_price,line_items,request_id,requests(title,description,category,vehicle_label,district,zip,preferred_date,date_flexible,asap,extras)), profiles:customer_id(full_name,email)")
    .eq("workshop_id",myWorkshop.id).order("created_at",{ascending:false});
  if(error){body.innerHTML=`<div class="warn">${esc(error.message)}</div>`;return;}
  if(!data||data.length===0){body.innerHTML='<div class="empty"><div class="e">🗂️</div><p class="sub">Noch keine gebuchten Aufträge. Sobald ein Kunde dein Angebot annimmt, erscheint der Auftrag hier.</p></div>';return;}
  body.innerHTML=data.map(b=>{
    const r=b.offers?.requests||{};
    const c=CATS[r.category]||["🔧",r.category||""];
    const s=BK_STATUS[b.status]||["?","b-grey"];
    const cust=b.profiles?.full_name||b.profiles?.email||"Kunde";
    const opts=Object.entries(BK_STATUS).map(([k,v])=>`<option value="${k}" ${k===b.status?"selected":""}>${v[0]}</option>`).join("");
    return`<div class="card">
      <div class="rowTop"><div class="ico">${c[0]}</div>
        <div style="flex:1"><div class="tt">${esc(r.title||"Auftrag")}</div>
        <div class="mm">👤 ${esc(cust)} · <b>${Math.round(b.total_price)} €</b></div>
        <div class="mm">🚗 ${esc(r.vehicle_label||"k.A.")}</div>
        <div class="mm">${c[1]}${r.district?" · 📍 "+esc(r.district):""}${b.scheduled_at?" · 📅 "+fmtDate(b.scheduled_at):r.preferred_date?" · 📅 Wunsch: "+fmtDate(r.preferred_date):""}${r.asap?" · ⚡ ASAP":""}</div>
        ${r.description?'<div class="mm" style="margin-top:4px">'+esc(r.description)+"</div>":""}</div>
        <span class="badge ${s[1]}">${s[0]}</span></div>
      <div class="foot">
        <select style="width:auto;flex:1;padding:9px" onchange="setBkStatus('${b.id}',this.value)">${opts}</select>
        <button class="btn ghost sm" onclick="openJobChat('${b.offers?.request_id}')">💬 Chat</button>
      </div>
    </div>`;
  }).join("");
}
async function setBkStatus(id,status){
  const {error}=await db.from("bookings").update({status}).eq("id",id);
  if(error){alert(error.message);}else{renderWs("jobs");}
}
async function openJobChat(requestId){
  if(!requestId)return;
  cleanRT();setBack(()=>renderWs("jobs"));
  main.innerHTML=`<h2>Auftrags-Chat</h2>
    <div class="msgs" id="msgs" style="max-height:none"></div>
    <div class="msgRow"><input id="msgIn" placeholder="Nachricht…"><button onclick="sendMsg('${requestId}')">➤</button></div>`;
  loadMsgs(requestId);
  rtChannel=db.channel("jc:"+requestId)
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages",filter:"request_id=eq."+requestId},()=>loadMsgs(requestId))
    .subscribe();
}

function wsProfile(){
  const myCats=myWorkshop.categories||[];
  $("wsBody").innerHTML=`
    <div class="note">Wähle, welche Leistungen du anbietest. Du siehst nur Ausschreibungen aus deinen Kategorien.</div>
    <div class="catGrid" id="pCats">${Object.entries(CATS).map(([k,v])=>`
      <div class="catCard ${myCats.includes(k)?'on':''}" data-k="${k}" onclick="this.classList.toggle('on')"><span class="ce">${v[0]}</span><span class="cn">${v[1]}</span></div>`).join("")}</div>
    <button class="btn" onclick="saveWsCats()">Kategorien speichern</button>
    <button class="btn ghost" onclick="signOut()">Abmelden</button>`;
}
async function saveWsCats(){
  const cats=[...document.querySelectorAll("#pCats .catCard.on")].map(c=>c.dataset.k);
  if(cats.length===0)return alert("Bitte mindestens eine Kategorie wählen.");
  const {error}=await db.from("workshops").update({categories:cats}).eq("id",myWorkshop.id);
  if(error)alert(error.message);
  else{myWorkshop.categories=cats;alert("Gespeichert ✅");renderWs("open");}
}

// ---------------- Helfer ----------------
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
function showErr(el,msg){el.textContent=msg;el.style.display="block";}
function fmtDate(d){try{return new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"numeric"});}catch(e){return String(d);}}

route();
</script>
</body>
